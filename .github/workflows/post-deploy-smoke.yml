name: post-deploy-smoke

on:
  deployment_status:

jobs:
  smoke-remote:
    if: >-
      github.repository == 'chomamateusz/agentproofarch' &&
      github.event.deployment_status.state == 'success' &&
      (github.event.deployment.environment == 'Production' ||
       github.event.deployment.environment == 'Preview')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955
        with:
          ref: ${{ github.event.deployment.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: demo/package-lock.json
      - run: npm ci
      # Drive the production ALIAS, not environment_url (the per-deployment URL):
      # the alias is what users hit, Better Auth only trusts APP_BASE_URL as the
      # CSRF origin, and testing the alias also proves promotion/aliasing worked.
      # Production drives the alias (what users hit, proves promotion worked);
      # previews/staging drive their own deployment URL — auth trusts it via
      # the VERCEL_URL-derived origin.
      - run: npm run smoke:remote
        env:
          BASE_URL: ${{ github.event.deployment.environment == 'Production' && 'https://agentproofarch.vercel.app' || github.event.deployment_status.environment_url }}
